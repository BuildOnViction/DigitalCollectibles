[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.17"

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 160
multiline_func_header = "all"
number_underscore = "preserve"
quote_style = "double"
tab_width = 4
wrap_comments = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
